http:
  address: 0.0.0.0:4195
  enabled: true

input:
  broker:
    inputs:
      - mqtt:
          urls:
            - tcp://mqtt-broker:1883
          client_id: idp-local-mqtt-to-kafka
          user: ${MQTT_USERNAME}
          password: ${MQTT_PASSWORD}
          topics:
            - idp/v1/#
          qos: 1
          clean_session: true
      - redpanda:
          seed_brokers:
            - kafka:19092
          topics:
            - idp.source.configs.v1:0
          client_id: idp-local-mqtt-to-kafka-source-config-cache
          start_offset: earliest

pipeline:
  threads: 1
  processors:
    - mapping: |
        let mqtt_topic = metadata("mqtt_topic").or("")
        let parts = $mqtt_topic.split("/")
        root = this
        root._mqtt_topic = $mqtt_topic
        root._kafka_topic = metadata("kafka_topic").or("")
        root._topic_parts = $parts
        root._asset_id = if $parts.length() > 3 && $parts.index(2) == "assets" { $parts.index(3) } else { null }
        root._agent_id = if $parts.length() > 4 && $parts.index(2) == "agents" { $parts.index(3) } else if $parts.length() > 5 && $parts.index(4) == "agents" { $parts.index(5) } else { null }
        root._source_id = if $parts.length() > 5 && $parts.index(4) == "sources" { $parts.index(5) } else if $parts.length() > 7 && $parts.index(6) == "sources" { $parts.index(7) } else { null }
        root._point_key = if $parts.length() > 9 && $parts.index(8) == "points" { $parts.index(9) } else { null }

    - switch:
        - check: this.message_type == "idp.source.config.v1"
          processors:
            - cache:
                resource: source_configs
                operator: set
                key: '${! json("tenant_id") }|${! json("asset_id") }|${! json("agent_id") }|${! json("source_id") }|${! json("source_config_revision") }'
                value: '${! content().string() }'
            - mapping: root = deleted()

        - check: this.message_type == "idp.edge.source-config.v1"
          processors:
            - mapping: |
                let ingested_at = now()
                let tenant_id = this.tenant_id
                let asset_id = this.asset_id
                let agent_id = this.agent_id
                let source_id = this.source_id
                root.message_type = "idp.source.config.v1"
                root.tenant_id = $tenant_id
                root.asset_id = $asset_id
                root.agent_id = $agent_id
                root.source_id = $source_id
                root.source_type = this.source_type
                root.source_config_revision = this.source_config_revision
                root.ts = this.issued_at | this.ts | $ingested_at
                root.ingested_at = $ingested_at
                root.points = this.points.map_each(point -> {
                  "point_id": "%s|%s|%s|%s".format($tenant_id, $asset_id, $source_id, point.point_key),
                  "point_key": point.point_key,
                  "point_ref": point.point_ref,
                  "name": point.name,
                  "description": point.description | null,
                  "signal_type": point.signal_type,
                  "value_type": point.value_type,
                  "value_model": point.value_model,
                  "unit": point.unit | null,
                  "tags": point.tags | {},
                })
            - cache:
                resource: source_configs
                operator: set
                key: '${! json("tenant_id") }|${! json("asset_id") }|${! json("agent_id") }|${! json("source_id") }|${! json("source_config_revision") }'
                value: '${! content().string() }'
            - mapping: root = deleted()

        - check: this.message_type == "idp.edge.agent-runtime-config.v1"
          processors:
            - mapping: root = deleted()

        - check: this.message_type == "idp.edge.config.status.v1"
          processors:
            - mapping: root = deleted()

        - check: this.message_type == "idp.edge.telemetry.event.v1"
          processors:
            - branch:
                processors:
                  - cache:
                      resource: source_configs
                      operator: get
                      key: '${! json("tenant_id") }|${! json("_asset_id") }|${! json("_agent_id") }|${! json("_source_id") }|${! json("source_config_revision") }'
                result_map: root._source_config = this
            - mapping: |
                let ingested_at = now()
                let point_index = this._source_config.points.find_by(point -> point.point_key == this._point_key)
                let point = if $point_index >= 0 { this._source_config.points.index($point_index) } else { throw("point_not_in_source_config") }
                root.message_type = "idp.telemetry.event.v1"
                root.tenant_id = this.tenant_id
                root.event_id = this.event_id
                root.idempotency_key = "%s|%s|%s|%s".format(this.tenant_id, this._asset_id, this._agent_id, this.event_id)
                root.asset_id = this._asset_id
                root.agent_id = this._agent_id
                root.source_id = this._source_id
                root.source_type = this._source_config.source_type
                root.point_id = $point.point_id
                root.point_key = this._point_key
                root.point_ref = $point.point_ref
                root.source_config_revision = this.source_config_revision
                root.ts = this.ts
                root.ingested_at = $ingested_at
                root.event_type = this.event_type
                root.observation_mode = this.observation_mode
                root.value_type = $point.value_type
                root.value = this.value
                root.value_raw = this.value_raw | null
                root.quality = this.quality
                root.sequence = this.sequence
                root.metadata = {
                  "name": $point.name,
                  "description": $point.description | null,
                  "value_model": $point.value_model,
                  "signal_type": $point.signal_type,
                  "unit": $point.unit | null,
                }
                meta kafka_topic = "idp.telemetry.events.v1"
                meta kafka_key = "%s|%s|%s|%s".format(root.tenant_id, root.asset_id, root.source_id, root.point_key)

        - check: this.message_type == "idp.edge.source.connection.v1"
          processors:
            - mapping: |
                let ingested_at = now()
                root.message_type = "idp.source.connection.v1"
                root.tenant_id = if this.tenant_id != null { this.tenant_id } else { throw("tenant_claim_missing") }
                root.asset_id = if this._asset_id != null { this._asset_id } else { throw("topic_template_mismatch") }
                root.agent_id = if this._agent_id != null { this._agent_id } else { throw("topic_template_mismatch") }
                root.source_id = if this._source_id != null { this._source_id } else { throw("topic_template_mismatch") }
                root.state = this.state
                root.ts = this.ts
                root.ingested_at = $ingested_at
                root.reason = this.reason | null
                meta kafka_topic = "idp.source.connections.v1"
                meta kafka_key = "%s|%s|%s|%s".format(root.tenant_id, root.asset_id, root.agent_id, root.source_id)

        - check: this.message_type == "idp.edge.agent.lwt.v1"
          processors:
            - mapping: |
                let ingested_at = now()
                root.message_type = "idp.agent.status.v1"
                root.tenant_id = if this.tenant_id != null { this.tenant_id } else { throw("tenant_claim_missing") }
                root.asset_id = if this._asset_id != null { this._asset_id } else { throw("topic_template_mismatch") }
                root.agent_id = if this._agent_id != null { this._agent_id } else { throw("topic_template_mismatch") }
                root.status = this.status
                root.ts = this.ts
                root.ingested_at = $ingested_at
                meta kafka_topic = "idp.agent.status.v1"
                meta kafka_key = "%s|%s|%s".format(root.tenant_id, root.asset_id, root.agent_id)

        - processors:
            - mapping: |
                let ingested_at = now()
                root.message_type = "idp.ingestion.error.v1"
                root.error_id = uuid_v4()
                root.reason_code = "topic_template_mismatch"
                root.mqtt_topic = this._mqtt_topic
                root.message_type_in = this.message_type | null
                root.asset_id = this._asset_id
                root.agent_id = this._agent_id
                root.source_id = this._source_id
                root.point_key = this._point_key
                root.detail = "MQTT message did not match a supported ingestion route"
                root.raw_payload_snapshot = content().string()
                root.ingested_at = $ingested_at
                meta kafka_topic = "idp.ingestion.errors.v1"
                meta kafka_key = "%s|%s|%s|%s".format(root.asset_id.or("unknown"), root.agent_id.or("unknown"), root.source_id.or("unknown"), root.message_type_in.or("unknown"))

    - catch:
        - mapping: |
            let ingested_at = now()
            root.message_type = "idp.ingestion.error.v1"
            root.error_id = uuid_v4()
            root.reason_code = if error().contains("point_not_in_source_config") {
              "point_not_in_source_config"
            } else if error().contains("topic_template_mismatch") {
              "topic_template_mismatch"
            } else if this.message_type == "idp.edge.telemetry.event.v1" && this.source_config_revision != null && this._source_config == null {
              "source_config_revision_missing"
            } else if error().contains("key does not exist") || error().contains("not found") {
              "source_config_revision_missing"
            } else {
              "payload_schema_invalid"
            }
            root.mqtt_topic = this._mqtt_topic
            root.message_type_in = this.message_type | null
            root.asset_id = this._asset_id
            root.agent_id = this._agent_id
            root.source_id = this._source_id
            root.point_key = this._point_key
            root.detail = error()
            root.raw_payload_snapshot = content().string()
            root.ingested_at = $ingested_at
            meta kafka_topic = "idp.ingestion.errors.v1"
            meta kafka_key = "%s|%s|%s|%s".format(root.asset_id.or("unknown"), root.agent_id.or("unknown"), root.source_id.or("unknown"), root.message_type_in.or("unknown"))

output:
  redpanda:
    seed_brokers:
      - kafka:19092
    topic: '${! meta("kafka_topic") }'
    key: '${! meta("kafka_key") }'

cache_resources:
  - label: source_configs
    memory:
      default_ttl: 24h

logger:
  level: INFO
