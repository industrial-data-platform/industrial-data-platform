name: industrial-data-platform-local

services:
  mqtt-broker:
    image: ${MOSQUITTO_IMAGE:-eclipse-mosquitto:2}
    restart: unless-stopped
    env_file:
      - ${LOCAL_STACK_ENV_FILE:-../../.env}
    command: ["/bin/sh", "/mosquitto/config/start-mosquitto.sh"]
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/config/start-mosquitto.sh:/mosquitto/config/start-mosquitto.sh:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mosquitto_sub -h 127.0.0.1 -p 1883 -u \"$${MQTT_USERNAME}\" -P \"$${MQTT_PASSWORD}\" -C 1 -W 3 -t '$$SYS/broker/version' >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  kafka:
    image: ${KAFKA_IMAGE:-apache/kafka:4.2.0}
    restart: unless-stopped
    hostname: kafka
    ports:
      - "${KAFKA_PORT:-19092}:9092"
    environment:
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_LISTENERS: "CONTROLLER://:29093,PLAINTEXT://:19092,PLAINTEXT_HOST://:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:${KAFKA_PORT:-19092}"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --list >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka-init:
    image: ${KAFKA_IMAGE:-apache/kafka:4.2.0}
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        create_topic() {
          topic="$$1"
          shift
          /opt/kafka/bin/kafka-topics.sh \
            --bootstrap-server kafka:19092 \
            --create \
            --if-not-exists \
            --topic "$$topic" \
            --partitions 1 \
            --replication-factor 1 \
            "$$@"
        }
        create_topic idp.telemetry.events.v1 --config retention.ms=604800000
        create_topic idp.edge.configs.v1 --config cleanup.policy=compact
        create_topic idp.source.configs.v1 --config cleanup.policy=compact
        create_topic idp.source.connections.v1 --config cleanup.policy=compact
        create_topic idp.agent.status.v1 --config cleanup.policy=compact
        create_topic idp.ingestion.errors.v1 --config retention.ms=2592000000
        create_topic idp.derived.events.v1 --config retention.ms=604800000
        create_topic idp.telemetry-store.dlq.v1 --config retention.ms=2592000000
        create_topic ${KAFKA_CONNECT_CONFIG_TOPIC:-idp.local.kafka-connect.configs} --config cleanup.policy=compact
        create_topic ${KAFKA_CONNECT_OFFSET_TOPIC:-idp.local.kafka-connect.offsets} --config cleanup.policy=compact
        create_topic ${KAFKA_CONNECT_STATUS_TOPIC:-idp.local.kafka-connect.status} --config cleanup.policy=compact

  clickhouse:
    image: ${CLICKHOUSE_IMAGE:-clickhouse/clickhouse-server:25.4}
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-idp}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-idp}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-change-me-local-clickhouse}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-log:/var/log/clickhouse-server
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "clickhouse-client --host 127.0.0.1 --user \"$${CLICKHOUSE_USER}\" --password \"$${CLICKHOUSE_PASSWORD}\" --query 'SELECT 1' >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-idp_config_registry}
      POSTGRES_USER: ${POSTGRES_USER:-idp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h 127.0.0.1 -p 5432 -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  idp-config-registry:
    build:
      context: ../..
      dockerfile: infra/local/idp-config-registry/Dockerfile
    image: ${CONFIG_REGISTRY_IMAGE:-industrial-data-platform/idp-config-registry:local}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: ["idp-config-registry", "serve", "--reload"]
    ports:
      - "${CONFIG_REGISTRY_PORT:-8000}:8000"
    environment:
      CONFIG_REGISTRY_HOST: 0.0.0.0
      CONFIG_REGISTRY_PORT: 8000
      CONFIG_REGISTRY_INTERNAL_MODE: ${CONFIG_REGISTRY_INTERNAL_MODE:-true}
      CONFIG_REGISTRY_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-idp}:${POSTGRES_PASSWORD:-change-me-local-postgres}@postgres:5432/${POSTGRES_DB:-idp_config_registry}
      PYTHONPATH: /app/apps/idp_config_registry/src
    volumes:
      - ../../apps/idp_config_registry:/app/apps/idp_config_registry
      - ../../docs/contracts:/app/docs/contracts:ro

  idp-config-registry-outbox-worker:
    build:
      context: ../..
      dockerfile: infra/local/idp-config-registry/Dockerfile
    image: ${CONFIG_REGISTRY_IMAGE:-industrial-data-platform/idp-config-registry:local}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    command: ["idp-config-registry", "publish-config-outbox-worker"]
    environment:
      CONFIG_REGISTRY_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-idp}:${POSTGRES_PASSWORD:-change-me-local-postgres}@postgres:5432/${POSTGRES_DB:-idp_config_registry}
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      CONFIG_REGISTRY_KAFKA_CLIENT_ID: ${CONFIG_REGISTRY_KAFKA_CLIENT_ID:-idp-config-registry-outbox-worker}
      CONFIG_REGISTRY_OUTBOX_BATCH_LIMIT: ${CONFIG_REGISTRY_OUTBOX_BATCH_LIMIT:-100}
      CONFIG_REGISTRY_OUTBOX_LEASE_SECONDS: ${CONFIG_REGISTRY_OUTBOX_LEASE_SECONDS:-30}
      CONFIG_REGISTRY_OUTBOX_RETRY_DELAY_SECONDS: ${CONFIG_REGISTRY_OUTBOX_RETRY_DELAY_SECONDS:-30}
      CONFIG_REGISTRY_OUTBOX_MAX_ATTEMPTS: ${CONFIG_REGISTRY_OUTBOX_MAX_ATTEMPTS:-5}
      CONFIG_REGISTRY_OUTBOX_POLL_INTERVAL_SECONDS: ${CONFIG_REGISTRY_OUTBOX_POLL_INTERVAL_SECONDS:-2.0}

  idp-asset-graph-registry:
    build:
      context: ../..
      dockerfile: infra/local/idp-asset-graph-registry/Dockerfile
    image: ${ASSET_GRAPH_REGISTRY_IMAGE:-industrial-data-platform/idp-asset-graph-registry:local}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      idp-config-registry:
        condition: service_started
    command: ["idp-asset-graph-registry", "serve", "--reload"]
    ports:
      - "${ASSET_GRAPH_REGISTRY_PORT:-8010}:8010"
    environment:
      ASSET_GRAPH_REGISTRY_HOST: 0.0.0.0
      ASSET_GRAPH_REGISTRY_PORT: 8010
      ASSET_GRAPH_REGISTRY_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-idp}:${POSTGRES_PASSWORD:-change-me-local-postgres}@postgres:5432/${POSTGRES_DB:-idp_config_registry}
      ASSET_GRAPH_CONFIG_REGISTRY_URL: http://idp-config-registry:8000
      PYTHONPATH: /app/apps/idp_asset_graph_registry/src
    volumes:
      - ../../apps/idp_asset_graph_registry:/app/apps/idp_asset_graph_registry

  grafana:
    build:
      context: ./grafana
      args:
        GRAFANA_BASE_IMAGE: ${GRAFANA_BASE_IMAGE:-grafana/grafana:12.2.0}
        GRAFANA_CLICKHOUSE_DATASOURCE_VERSION: ${GRAFANA_CLICKHOUSE_DATASOURCE_VERSION:-4.15.0}
    image: ${GRAFANA_IMAGE:-industrial-data-platform/grafana-clickhouse:local}
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me-local-grafana}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PATHS_PLUGINS: /var/lib/grafana-plugins
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-idp}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-idp}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-change-me-local-clickhouse}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

  kafka-connect:
    build:
      context: ./kafka-connect
      args:
        KAFKA_CONNECT_BASE_IMAGE: ${KAFKA_CONNECT_BASE_IMAGE:-confluentinc/cp-kafka-connect:7.7.1}
        CLICKHOUSE_KAFKA_CONNECT_VERSION: ${CLICKHOUSE_KAFKA_CONNECT_VERSION:-latest}
    image: ${KAFKA_CONNECT_IMAGE:-industrial-data-platform/kafka-connect-clickhouse:local}
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
    ports:
      - "${KAFKA_CONNECT_REST_PORT:-8083}:8083"
      - "${KAFKA_CONNECT_JMX_PORT:-9102}:9102"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:19092
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: ${KAFKA_CONNECT_GROUP_ID:-idp-local-clickhouse-connect}
      CONNECT_CONFIG_STORAGE_TOPIC: ${KAFKA_CONNECT_CONFIG_TOPIC:-idp.local.kafka-connect.configs}
      CONNECT_OFFSET_STORAGE_TOPIC: ${KAFKA_CONNECT_OFFSET_TOPIC:-idp.local.kafka-connect.offsets}
      CONNECT_STATUS_STORAGE_TOPIC: ${KAFKA_CONNECT_STATUS_TOPIC:-idp.local.kafka-connect.status}
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_FLUSH_INTERVAL_MS: 10000
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      CONNECT_LOG4J_LOGGERS: org.apache.kafka.connect.runtime.rest=WARN,org.reflections=ERROR,com.clickhouse=INFO
      KAFKA_JMX_PORT: 9102
      KAFKA_JMX_HOSTNAME: kafka-connect

  redpanda-connect:
    image: ${REDPANDA_CONNECT_IMAGE:-docker.redpanda.com/redpandadata/connect}
    restart: unless-stopped
    depends_on:
      mqtt-broker:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    env_file:
      - ${LOCAL_STACK_ENV_FILE:-../../.env}
    command: ["run", "/etc/redpanda-connect/mqtt-to-kafka.yaml"]
    ports:
      - "${REDPANDA_CONNECT_PORT:-4195}:4195"
    volumes:
      - ./redpanda-connect/mqtt-to-kafka.yaml:/etc/redpanda-connect/mqtt-to-kafka.yaml:ro

  redpanda-connect-config-projection:
    image: ${REDPANDA_CONNECT_IMAGE:-docker.redpanda.com/redpandadata/connect}
    restart: unless-stopped
    depends_on:
      mqtt-broker:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    env_file:
      - ${LOCAL_STACK_ENV_FILE:-../../.env}
    command: ["run", "/etc/redpanda-connect/kafka-to-mqtt-config.yaml"]
    ports:
      - "${REDPANDA_CONNECT_CONFIG_PORT:-4196}:4195"
    volumes:
      - ./redpanda-connect/kafka-to-mqtt-config.yaml:/etc/redpanda-connect/kafka-to-mqtt-config.yaml:ro

  redpanda-connect-source-config-snapshot:
    image: ${REDPANDA_CONNECT_IMAGE:-docker.redpanda.com/redpandadata/connect}
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    command: ["run", "/etc/redpanda-connect/source-config-snapshot.yaml"]
    ports:
      - "${REDPANDA_CONNECT_SOURCE_CONFIG_PORT:-4197}:4195"
    volumes:
      - ./redpanda-connect/source-config-snapshot.yaml:/etc/redpanda-connect/source-config-snapshot.yaml:ro

  kafka-ui:
    image: ${KAFKA_UI_IMAGE:-provectuslabs/kafka-ui}
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
      DYNAMIC_CONFIG_ENABLED: "false"

  mqttx-web:
    image: ${MQTTX_WEB_IMAGE:-emqx/mqttx-web}
    restart: unless-stopped
    depends_on:
      mqtt-broker:
        condition: service_healthy
    ports:
      - "${MQTTX_WEB_PORT:-8081}:80"

volumes:
  mosquitto-data:
  mosquitto-log:
  clickhouse-data:
  clickhouse-log:
  grafana-data:
  postgres-data:
