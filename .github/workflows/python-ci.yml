name: Python CI

on:
    push:
        paths:
            - ".github/workflows/python-ci.yml"
            - ".python-version"
            - "pyproject.toml"
            - "uv.lock"
            - "apps/**"
            - "libs/**"
            - "infra/**"
            - "tools/**"
            - "tests/**"
    pull_request:
        paths:
            - ".github/workflows/python-ci.yml"
            - ".python-version"
            - "pyproject.toml"
            - "uv.lock"
            - "apps/**"
            - "libs/**"
            - "infra/**"
            - "tools/**"
            - "tests/**"

permissions:
    contents: read

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version-file: ".python-version"

            - name: Set up uv
              uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true

            - name: Sync workspace
              run: uv sync --frozen --all-packages --group lint

            - name: Run Ruff
              run: uv run --frozen --group lint ruff check apps libs tests infra tools

    test:
        name: Test (${{ matrix.package }})
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                include:
                    - package: edge-telemetry-agent
                      test_path: apps/edge_telemetry_agent/tests
                    - package: knx-demo
                      test_path: apps/knx_demo/tests
                    - package: idp-config-registry
                      test_path: apps/idp_config_registry/tests
                    - package: knx-project-parser
                      test_path: libs/knx_project_parser/tests
                    - package: idp-demo-stack
                      test_path: libs/idp_demo_stack/tests
                    - package: idp-telemetry-store
                      test_path: tools/idp_telemetry_store/tests

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version-file: ".python-version"

            - name: Set up uv
              uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true

            - name: Sync workspace
              run: uv sync --frozen --all-packages --group coverage

            - name: Run tests
              run: |
                  mkdir -p coverage-data
                  uv run --frozen --all-packages --group coverage \
                    coverage run -m pytest ${{ matrix.test_path }}
                  mv .coverage coverage-data/${{ matrix.package }}.coverage

            - name: Upload coverage data
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-${{ matrix.package }}
                  path: coverage-data/${{ matrix.package }}.coverage

    integration:
        name: Integration
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version-file: ".python-version"

            - name: Set up uv
              uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true

            - name: Sync workspace
              run: uv sync --frozen --all-packages --group integration --group coverage

            - name: Check compose config
              env:
                  LOCAL_STACK_ENV_FILE: ../../.env.example
              run: docker compose -f infra/local/compose.yaml config --quiet

            - name: Lint Redpanda Connect pipeline
              run: |
                  docker run --rm \
                    -e MQTT_USERNAME=lint \
                    -e MQTT_PASSWORD=lint \
                    -v "$PWD/infra/local/redpanda-connect/mqtt-to-kafka.yaml:/mqtt-to-kafka.yaml:ro" \
                    docker.redpanda.com/redpandadata/connect lint /mqtt-to-kafka.yaml

            - name: Run integration tests
              run: |
                  mkdir -p coverage-data
                  uv run --frozen --all-packages --group integration --group coverage coverage run -m pytest \
                    tests/integration/test_config_registry_kafka_publisher.py \
                    tests/integration/test_config_registry_postgres.py \
                    tests/integration/test_edge_agent_mqtt_publisher.py \
                    tests/integration/test_edge_agent_knx_to_mqtt.py \
                    tests/integration/test_kafka_to_clickhouse_storage.py \
                    tests/integration/test_grafana_clickhouse.py
                  mv .coverage coverage-data/integration.coverage

            - name: Upload coverage data
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-integration
                  path: coverage-data/integration.coverage

    backoffice-ui:
        name: Backoffice UI
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version-file: ".python-version"

            - name: Set up uv
              uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true

            - name: Sync workspace
              run: uv sync --frozen --all-packages --group integration --group ui --group coverage

            - name: Install Chromium
              run: uv run --frozen --group ui playwright install --with-deps chromium

            - name: Run Backoffice UI tests
              run: |
                  mkdir -p coverage-data test-results
                  uv run --frozen --all-packages --group integration --group ui --group coverage \
                    coverage run -m pytest \
                      tests/integration/test_config_registry_backoffice_ui.py \
                      -m integration_backoffice_ui \
                      --browser chromium \
                      --tracing retain-on-failure \
                      --screenshot only-on-failure \
                      --output test-results
                  mv .coverage coverage-data/backoffice-ui.coverage

            - name: Upload Playwright failure artifacts
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: test-results-backoffice-ui
                  path: test-results/

            - name: Upload coverage data
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-backoffice-ui
                  path: coverage-data/backoffice-ui.coverage

    coverage:
        name: Coverage
        runs-on: ubuntu-latest
        needs:
            - test
            - integration
            - backoffice-ui
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version-file: ".python-version"

            - name: Set up uv
              uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true

            - name: Sync workspace
              run: uv sync --frozen --all-packages --group coverage

            - name: Download coverage data
              uses: actions/download-artifact@v5
              with:
                  path: coverage-artifacts
                  pattern: coverage-*
                  merge-multiple: true

            - name: Build coverage report
              run: |
                  coverage_files="$(find coverage-artifacts -type f -name '*.coverage' | sort)"
                  if [ -z "${coverage_files}" ]; then
                    echo "No coverage files were downloaded." >&2
                    exit 1
                  fi
                  uv run --frozen --group coverage coverage combine --keep ${coverage_files}
                  uv run --frozen --group coverage coverage report | tee coverage-report.txt
                  uv run --frozen --group coverage coverage xml -o coverage.xml
                  uv run --frozen --group coverage genbadge coverage -i coverage.xml -o coverage.svg
                  {
                    echo "### Coverage"
                    echo
                    echo '```text'
                    cat coverage-report.txt
                    echo '```'
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Publish coverage badge
              if: github.event_name == 'push'
              env:
                  GITHUB_TOKEN: ${{ github.token }}
              run: |
                  badge_dir="$(mktemp -d)"
                  cp coverage.svg "${badge_dir}/coverage.svg"
                  printf '%s\n' '# Coverage badge assets' > "${badge_dir}/README.md"
                  pushd "${badge_dir}" >/dev/null
                  git init
                  git checkout --orphan badges
                  git add coverage.svg README.md
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git commit -m "Update coverage badge"
                  git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
                  git push --force origin badges
                  popd >/dev/null
