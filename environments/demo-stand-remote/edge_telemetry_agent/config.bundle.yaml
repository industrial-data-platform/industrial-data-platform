tenant_id: "demo-tenant"
asset_id: "demo-stand-01"
agent_id: "demo-stand-remote"
config_revision: "rev-demo-stand-remote-001"
issued_at: "2026-05-02T00:00:00Z"
sources:
  - source_id: "knx_main"
    source_config_revision: "rev-demo-stand-remote-knx-main-001"
    source_type: "knx"
    enabled: true
    connection:
      gateway_ip: "${KNX_EXTERNAL_GATEWAY_IP}"
      gateway_port: "${KNX_EXTERNAL_GATEWAY_PORT}"
      connection_type: "tunneling"
      transport: "udp"
      route_back: "${KNX_EXTERNAL_ROUTE_BACK}"
      auto_reconnect: true
      reconnect_backoff_seconds: [1, 5, 15, 30]
    acquisition_defaults:
      listen: true
      read_on_start: false
      periodic_interval_seconds: null
    publish_defaults:
      enabled: true
      change_threshold: null
    points:
      - point_key: "0%2F0%2F1"
        point_ref: "0/0/1"
        name: "switch_command"
        description: "Light command channel"
        signal_type: "command"
        value_type: "boolean"
        value_model: "knx.dpt.1.001"
        unit: null
        acquisition:
          listen: true
          read_on_start: false
          periodic_interval_seconds: null
        publish:
          enabled: false
          change_threshold: null
        tags:
          room: "demo"
          equipment: "light_1"
      - point_key: "0%2F0%2F7"
        point_ref: "0/0/7"
        name: "switch_feedback"
        description: "Light feedback channel"
        signal_type: "feedback"
        value_type: "boolean"
        value_model: "knx.dpt.1.001"
        unit: null
        acquisition:
          listen: true
          read_on_start: true
          periodic_interval_seconds: null
        publish:
          enabled: true
          change_threshold: null
        tags:
          room: "demo"
          equipment: "light_1"
      - point_key: "2%2F0%2F0"
        point_ref: "2/0/0"
        name: "temperature"
        description: "Room temperature sensor"
        signal_type: "sensor"
        value_type: "number"
        value_model: "knx.dpt.9.001"
        unit: "C"
        acquisition:
          listen: true
          read_on_start: true
          periodic_interval_seconds: null
        publish:
          enabled: true
          change_threshold: 1.0
        tags:
          room: "demo"
          equipment: "temp_1"
