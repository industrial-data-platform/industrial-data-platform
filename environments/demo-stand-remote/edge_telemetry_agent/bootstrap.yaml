agent_id: "demo-stand-remote"

delivery:
  transport: "mqtt"
  mqtt:
    enabled: true
    version: "5.0"
    broker: "${MQTT_BROKER}"
    topic_root: "idp/v1"
    client_id_prefix: "edge-telemetry-agent"
    username_env: "MQTT_USERNAME"
    password_env: "MQTT_PASSWORD"
    qos: 1
    clean_start: true
    session_expiry_seconds: 0
    telemetry_message_expiry_seconds: 86400
    connect_timeout_seconds: 5
    retry_backoff_seconds: [5, 15, 60, 300]

storage:
  sqlite_path: ".local/demo-stand-remote/edge-telemetry-agent/outbox.db"
  retention_days: 7
  dead_letter_after_attempts: 20

observability:
  log_level: "INFO"
  emit_health_events: true
  metrics_bind: "127.0.0.1:9108"
